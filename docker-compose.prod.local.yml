x-laravel-env: &laravel-env
  APP_NAME: ${APP_NAME}
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  APP_BASE_PATH: ${APP_BASE_PATH}
  APP_LOCALE: ${APP_LOCALE}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE}

  HTTPD_PORT: ${HTTPD_PORT}

  LOG_CHANNEL: ${LOG_CHANNEL}
  LOG_STACK: ${LOG_STACK}
  LOG_LEVEL: ${LOG_LEVEL}

  DB_CONNECTION: ${DB_CONNECTION}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

  SESSION_DRIVER: ${SESSION_DRIVER}
  SESSION_LIFETIME: ${SESSION_LIFETIME}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT}
  SESSION_PATH: ${SESSION_PATH}
  SESSION_DOMAIN: ${SESSION_DOMAIN}

  CACHE_STORE: ${CACHE_STORE}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION}
  BROADCAST_CONNECTION: ${BROADCAST_CONNECTION}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK}

  REDIS_CLIENT: ${REDIS_CLIENT}
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_PASSWORD: ${REDIS_PASSWORD}

services:
  # Основной контейнер Laravel PHP-FPM (Production)
  laravel-php-apache-tcp:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
      target: production
    image: laravel-php-apache-tcp:latest
    pull_policy: never
    container_name: laravel-php-apache-tcp
    restart: unless-stopped
    environment:
      <<: *laravel-env
    working_dir: /var/www/laravel
    command: >
      sh -c "
        php artisan optimize:clear &&
        php artisan migrate --force &&
        exec php-fpm -F
      "
    networks:
      - laravel-apache-tcp-network
    depends_on:
      laravel-postgres-apache-tcp:
        condition: service_healthy
      laravel-redis-apache-tcp:
        condition: service_healthy
    healthcheck:
      # Проверка доступности FPM через TCP порт 9000
      test:
        [
          "CMD-SHELL",
          "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q 'pong'"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Веб-сервер Httpd (Proxy)
  laravel-apache-tcp:
    build:
      context: .
      dockerfile: docker/httpd.Dockerfile
      target: production
    image: laravel-apache-tcp:latest
    pull_policy: never
    container_name: laravel-apache-tcp
    restart: unless-stopped
    ports:
      - "${HTTPD_PORT:-8050}:80"
    networks:
      - laravel-apache-tcp-network
    depends_on:
      laravel-php-apache-tcp:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # База данных PostgreSQL
  laravel-postgres-apache-tcp:
    image: postgres:18.2-alpine
    container_name: laravel-postgres-apache-tcp
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - laravel-apache-tcp-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Хранилище данных Redis
  laravel-redis-apache-tcp:
    image: redis:8.6-alpine
    container_name: laravel-redis-apache-tcp
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-}" ]
    volumes:
      - redis-data:/data
    networks:
      - laravel-apache-tcp-network
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a \"${REDIS_PASSWORD:-}\" ping || redis-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Laravel Queue Worker — обработка фоновых задач
  laravel-queue-apache-tcp:
    image: laravel-php-apache-tcp:latest
    container_name: laravel-queue-apache-tcp
    pull_policy: never
    restart: unless-stopped
    environment:
      <<: *laravel-env
    working_dir: /var/www/laravel
    command: [ "php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--memory=256", "--max-jobs=1000" ]
    networks:
      - laravel-apache-tcp-network
    depends_on:
      laravel-php-apache-tcp:
        condition: service_healthy
      laravel-postgres-apache-tcp:
        condition: service_healthy
      laravel-redis-apache-tcp:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep -v grep | grep 'queue:work' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Laravel Scheduler — запуск периодических задач (cron)
  laravel-scheduler-apache-tcp:
    image: laravel-php-apache-tcp:latest
    container_name: laravel-scheduler-apache-tcp
    pull_policy: never
    restart: unless-stopped
    environment:
      <<: *laravel-env
    working_dir: /var/www/laravel
    command: [ "php", "artisan", "schedule:work" ]
    networks:
      - laravel-apache-tcp-network
    depends_on:
      laravel-php-apache-tcp:
        condition: service_healthy
      laravel-postgres-apache-tcp:
        condition: service_healthy
      laravel-redis-apache-tcp:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:

networks:
  laravel-apache-tcp-network:
    driver: bridge
